order-top:1px solid var(--line-soft)\"><span style=\"color:var(--ink)\">current cash<\u002Fspan><b style=\"font-family:var(--mono);font-weight:600\">$32,900<\u002Fb><\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;margin-top:12px;padding:11px 13px;border:1px solid var(--up-soft);border-left:3px solid var(--up);border-radius:9px;background:rgba(63,214,140,.05)\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:var(--up);flex:none;margin-top:5px;box-shadow:0 0 7px var(--up)\"><\u002Fspan>\n                    <div><p style=\"margin:0;font-size:12.5px;font-weight:600;color:var(--up)\">New buys sized to cash on hand<\u002Fp><p style=\"margin:3px 0 0;font-size:11.5px;color:var(--ink-dim)\">Opens are capped at available cash ($32,900) plus planned sell proceeds. A nearly-invested account opens smaller — or opens nothing — never going negative.<\u002Fp><\u002Fdiv>\n                  <\u002Fdiv>\n                  <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:10px 0 0\">Money is tracked to the exact cent — the whole balance rebuilds from the list of cash events.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isAi }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">AI seats<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">what each one decides, in the open<\u002Fspan>\n          <button sc-camel-on-click=\"{{ openPairs }}\" style=\"margin-left:auto;appearance:none;border:1px solid var(--violet-line);background:var(--violet-soft);color:var(--violet);font-family:var(--body);font-size:12.5px;font-weight:600;border-radius:8px;padding:7px 14px;cursor:pointer\" style-hover=\"background:rgba(139,124,246,.22)\">Open paired comparison →<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">The three AI seats on one screen. Each states the decision it owns, the model behind it, and its budget — and links to the full record. Nothing is a black box.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ aiSeats }}\" as=\"a\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid var(--line);border-left:3px solid {{ a.accent }};border-radius:14px;background:var(--panel);padding:18px 20px\">\n              <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\"><span style=\"{{ a.style }}\"><span style=\"{{ a.dot }}\"><\u002Fspan><span style=\"{{ a.nmStyle }}\">{{ a.nm }}<\u002Fspan><\u002Fspan><span style=\"font-size:13px;color:var(--ink)\">{{ a.role }}<\u002Fspan><span style=\"margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-faint)\">{{ a.meta }}<\u002Fspan><\u002Fdiv>\n              <p style=\"font-size:13px;color:var(--ink-dim);margin:12px 0 12px\"><span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-right:8px\">{{ a.date }}<\u002Fspan>{{ a.body }}<\u002Fp>\n              <div style=\"{{ linkRow }}\"><sc-for list=\"{{ a.links }}\" as=\"l\" hint-placeholder-count=\"2\"><span style=\"cursor:pointer\" style-hover=\"color:#f4c96e\">{{ l }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:16px 0 0\">A “seat” is one specific decision the AI owns. Every AI decision is saved in full and can be reopened to see exactly what it looked at.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isPairs }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <button sc-camel-on-click=\"{{ openAiFromPairs }}\" style=\"appearance:none;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--ink-faint);cursor:pointer;padding:0;margin:0 0 14px\" style-hover=\"color:var(--gold)\">← AI seats<\u002Fbutton>\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Paired comparison<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">the sharpest question the lab can ask<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">Comparing two strategies day-by-day cancels out the shared market moves and costs, leaving only what actually separates them — a much tighter margin of error than judging either alone. The raw totals sit small and dim; the difference carries the room.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:26px\">\n          <sc-for list=\"{{ pairs }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div>\n              <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:{{ p.accent }};margin:0 0 12px\">{{ p.title }}<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:14px\">\n                <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:16px 18px\"><p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:{{ p.lPc }};margin:0 0 8px\">{{ p.lPh }}<\u002Fp><span style=\"font-family:var(--disp);font-weight:800;font-size:26px\">{{ p.lBig }} <small style=\"font-family:var(--mono);font-size:12px;color:var(--ink-faint);font-weight:400\">{{ p.lSmall }}<\u002Fsmall><\u002Fspan><p style=\"color:var(--ink-dim);font-size:12px;margin:8px 0 0\">{{ p.lNote }}<\u002Fp><\u002Fdiv>\n                <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:16px 18px\"><p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:{{ p.rPc }};margin:0 0 8px\">{{ p.rPh }}<\u002Fp><span style=\"font-family:var(--disp);font-weight:800;font-size:26px\">{{ p.rBig }} <small style=\"font-family:var(--mono);font-size:12px;color:var(--ink-faint);font-weight:400\">{{ p.rSmall }}<\u002Fsmall><\u002Fspan><p style=\"color:var(--ink-dim);font-size:12px;margin:8px 0 0\">{{ p.rNote }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1px solid {{ p.accent }};border-radius:12px;background:var(--panel-3);padding:18px 20px\">\n                <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 6px\">paired daily-difference gap · β-adj · net<\u002Fp>\n                <span style=\"font-family:var(--disp);font-weight:800;font-size:24px\">{{ p.gap }} <small style=\"font-family:var(--mono);font-size:12px;color:var(--ink-faint);font-weight:400\">{{ p.mde }}<\u002Fsmall><\u002Fspan>\n                <div style=\"position:relative;height:46px;border-left:2px solid #3a4569;border-right:2px solid #3a4569;margin:14px 0 4px\">\n                  <div style=\"position:absolute;left:{{ p.bandL }};width:{{ p.bandW }};top:9px;bottom:9px;background:var(--gold-soft);border-radius:5px\"><\u002Fdiv>\n                  <div style=\"position:absolute;left:50%;top:4px;bottom:4px;width:1px;background:#3a4569\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:50%;left:{{ p.pt }};width:15px;height:15px;border-radius:50%;background:{{ p.accent }};transform:translate(-50%,-50%);border:2px solid var(--panel);box-shadow:0 0 10px {{ p.accent }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\"><span>{{ p.ax.0 }}<\u002Fspan><span>{{ p.ax.1 }}<\u002Fspan><span>{{ p.ax.2 }}<\u002Fspan><\u002Fdiv>\n                <p style=\"color:var(--ink-dim);font-size:12.5px;margin:14px 0 0\"><span style=\"{{ p.chipStyle }}\">{{ p.chipText }}<\u002Fspan>&nbsp; <sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\">{{ p.plainRead }}<\u002Fsc-if><sc-if value=\"{{ expert }}\" hint-placeholder-val=\"{{ false }}\">{{ p.verdict }}<\u002Fsc-if><\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isAllocation }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Allocation<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">every weight reconstructs from what's on screen<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/allocation<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">Each weight shows how it was set — the raw estimate, the target, the applied weight, and the limit that capped it. The allocator's own added value is measured here too, against simply splitting evenly.<\u002Fp>\n        <div style=\"display:flex;align-items:baseline;gap:10px;margin:0 0 12px\">\n          <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:0\">Is the loop improving things?<\u002Fp>\n          <span style=\"font-size:12px;color:var(--ink-faint)\">is the lab actually getting better?<\u002Fspan><span style=\"font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);border:1px dashed var(--line);border-radius:999px;padding:3px 9px\">planned · Phase 4+ read-model<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:22px\">\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--panel-3));padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 6px\">allocator value-add — blended vs equal-weight<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:2px\"><span style=\"font-family:var(--disp);font-weight:800;font-size:24px\">+0.6%/yr<\u002Fspan><span style=\"background:var(--gold-soft);color:var(--gold);font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:999px\">too early<\u002Fspan><\u002Fdiv><span style=\"font-family:var(--mono);font-size:12px;color:var(--ink-faint)\">MDE ±1.8% · 300d paired<\u002Fspan>\n            <div style=\"position:relative;height:40px;border-left:2px solid #3a4569;border-right:2px solid #3a4569;margin:12px 0 4px\">\n              <div style=\"position:absolute;left:6%;width:88%;top:8px;bottom:8px;background:var(--gold-soft);border-radius:5px\"><\u002Fdiv>\n              <div style=\"position:absolute;left:50%;top:4px;bottom:4px;width:1px;background:#3a4569\"><\u002Fdiv>\n              <div style=\"position:absolute;top:50%;left:65%;width:14px;height:14px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);border:2px solid var(--panel);box-shadow:0 0 9px var(--gold)\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\"><span>−2%<\u002Fspan><span>0<\u002Fspan><span>+2%<\u002Fspan><\u002Fdiv>\n            <p style=\"color:var(--ink-dim);font-size:12px;margin:11px 0 0\"><sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\">The smart allocator is beating an equal split by about +0.6%/yr — but still inside the margin, so not yet decidable. On track to settle around 2028.<\u002Fsc-if><sc-if value=\"{{ expert }}\" hint-placeholder-val=\"{{ false }}\">paired gap vs static equal-weight-across-strategies · MDE ±1.8% · 300d paired · inside band → too early<\u002Fsc-if><\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--panel-3));padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">researcher yield<\u002Fp><p style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin:-4px 0 12px\">proposals that survived vs were killed<\u002Fp>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px\">\n              <sc-for list=\"{{ researcherYield }}\" as=\"y\" hint-placeholder-count=\"3\"><span style=\"display:inline-flex;align-items:baseline;gap:6px\"><span style=\"font-family:var(--disp);font-weight:800;font-size:22px\">{{ y.n }}<\u002Fspan><span style=\"{{ y.style }}\">{{ y.label }}<\u002Fspan><\u002Fspan><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);border-top:1px solid var(--line-soft);padding-top:11px\"><span>median days-to-kill<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:var(--ink)\">47 days<\u002Fb><\u002Fdiv>\n            <p style=\"color:var(--ink-dim);font-size:12px;margin:11px 0 0\"><sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\">Of the AI's ideas: 3 accepted, 2 shown false, 1 confirmed — and a bad idea is typically dropped within ~7 weeks.<\u002Fsc-if><sc-if value=\"{{ expert }}\" hint-placeholder-val=\"{{ false }}\">accepted / refuted / confirmed, each citing parent evidence · median days-to-kill rendered beside the trials count<\u002Fsc-if><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n          <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px\">the book · one stacked bar (gold = live capital)<\u002Fp>\n          <div style=\"display:flex;height:38px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-bottom:8px\">\n            <sc-for list=\"{{ allocSegs }}\" as=\"s\" hint-placeholder-count=\"4\"><div style=\"width:{{ s.w }};background:{{ s.bg }};color:{{ s.c }};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10.5px;font-weight:600\">{{ s.w }}<\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:0 0 18px\">momentum:v1 28% · llm-contestant-01 27% · lowvol:v1 25% · control 20%<\u002Fp>\n          <div style=\"overflow-x:auto\"><sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n            <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ thL }}\">strategy<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">α̂ · se<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">shrunk α̃<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">target → applied<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">binding clamp<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n            <sc-raw-tbody><sc-for list=\"{{ allocRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <sc-raw-tr style-hover=\"background:rgba(255,255,255,.025)\"><sc-raw-td style=\"padding:12px 14px;border-bottom:1px solid var(--line-soft)\"><span style=\"font-weight:600\">{{ r.name }}<\u002Fspan> <span style=\"{{ r.seatStyle }}\">{{ r.seatText }}<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"padding:12px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono)\">{{ r.ase }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:12px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono)\">{{ r.shr }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:12px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono)\">{{ r.ta }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:12px 14px;border-bottom:1px solid var(--line-soft)\"><span style=\"{{ r.clampStyle }}\">{{ r.clamp }}<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <\u002Fsc-for><\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table><\u002Fdiv>\n          <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 8px\">weight history · momentum:v1 · each bar is a rebalance; a dot marks a weight change<\u002Fp>\n          <div style=\"display:flex;align-items:flex-end;gap:5px;height:46px\">\n            <sc-for list=\"{{ weightHist }}\" as=\"w\" hint-placeholder-count=\"8\"><div style=\"flex:1;background:var(--gold-soft);border-top:2px solid var(--gold);border-radius:2px 2px 0 0;height:{{ w.h }};position:relative\"><sc-if value=\"{{ w.mv }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:-6px;left:50%;width:6px;height:6px;border-radius:50%;background:var(--cyan);transform:translateX(-50%);box-shadow:0 0 6px var(--cyan)\"><\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:14px 0 0\">Every weight traces back to how it was set. The allocator's added value vs. splitting evenly: <span style=\"color:var(--ink-faint)\">~ +0.3%/yr<\u002Fspan>, margin ±1.1 — still too close to call<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isDecisions }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Decisions<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">every choice, replayable<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/decisions<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">A permanent record of what every strategy decided and why, one row per strategy per day. Each opens its full selection trail — and for an AI seat, the exact information it read. Click the AI row to open its audit.<\u002Fp>\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden\"><div style=\"overflow-x:auto\"><sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n          <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ thL }}\">strategy<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">seat<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">decision<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">sized / ordered<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">trace<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody><sc-for list=\"{{ decisionRows }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <sc-raw-tr sc-camel-on-click=\"{{ d.onClick }}\" style=\"cursor:{{ d.cursor }}\" style-hover=\"background:rgba(255,255,255,.025)\"><sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);font-weight:600\">{{ d.name }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft)\"><span style=\"{{ d.seatStyle }}\">{{ d.seatText }}<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:11.5px;color:var(--ink-dim)\">{{ d.dec }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:11.5px;color:var(--ink-dim)\">{{ d.sized }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);{{ traceStyle }}\">{{ d.trace }}<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-for><\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table><\u002Fdiv><\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:14px 0 0\">This log is never edited or deleted, and every row can be reproduced exactly. AI rows link to the exact information the model saw.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isAudit }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <button sc-camel-on-click=\"{{ openDecisionsFromAudit }}\" style=\"appearance:none;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--ink-faint);cursor:pointer;padding:0;margin:0 0 14px\" style-hover=\"color:var(--gold)\">← Decisions<\u002Fbutton>\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Decision audit<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">what the AI saw, exactly<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">Why the AI traded, on 2027-03-19: the six-stage selection trail, the exact bundle of facts it read (with its cost), and the saved decision itself. Re-running replays the saved record — no new AI calls.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px\">\n          <div>\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px\">funnel trail · watermark 2027-03-19T22:00Z<\u002Fp>\n            <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:6px 16px\">\n              <sc-for list=\"{{ funnel }}\" as=\"f\" hint-placeholder-count=\"7\"><div style=\"display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line-soft);align-items:baseline;font-size:13px;flex-wrap:wrap\"><span style=\"font-family:var(--mono);font-size:11px;color:var(--cyan);min-width:58px\">{{ f.n }}<\u002Fspan><span>{{ f.t }}<\u002Fspan><span style=\"margin-left:auto;font-family:var(--mono);color:var(--ink-dim);font-size:12px\">{{ f.val }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 10px\">what almost happened today<\u002Fp>\n            <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:6px 16px\">\n              <sc-for list=\"{{ nearMiss }}\" as=\"m\" hint-placeholder-count=\"4\"><div style=\"display:flex;align-items:baseline;gap:10px;font-size:12.5px;padding:9px 0;border-bottom:1px dashed var(--line-soft)\"><span style=\"font-weight:600;min-width:56px\">{{ m.sym }}<\u002Fspan><span style=\"color:var(--ink-dim)\">{{ m.txt }}<\u002Fspan><span style=\"color:var(--ink-faint);font-family:var(--mono);font-size:11px;margin-left:auto\">{{ m.rsn }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"border:1px solid var(--violet-line);border-radius:12px;background:var(--panel);overflow:hidden\">\n              <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);background:var(--violet-soft);padding:11px 16px;margin:0\">context pack · sha 9f3ac2…b71 · recipe cp-1.0 · #4,812<\u002Fp>\n              <sc-for list=\"{{ packLayers }}\" as=\"l\" hint-placeholder-count=\"4\"><div style=\"display:flex;gap:12px;align-items:baseline;padding:12px 16px;border-bottom:1px dashed var(--line-soft);font-size:13px;flex-wrap:wrap\"><span style=\"font-family:var(--mono);font-size:11px;color:var(--violet);min-width:28px\">{{ l.ln }}<\u002Fspan><span>{{ l.t }}<\u002Fspan><span style=\"margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-faint)\">{{ l.tok }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 10px\">persisted decision · ai_decisions #4,812<\u002Fp>\n            <div style=\"font-family:var(--mono);font-size:11.5px;line-height:1.8;background:#0b0f1c;border:1px solid var(--line-soft);border-radius:10px;padding:14px 16px;color:var(--ink-dim)\">strategy_id&nbsp;&nbsp;<b style=\"color:var(--ink);font-weight:500\">llm-contestant-01<\u002Fb> · as_of <b style=\"color:var(--ink);font-weight:500\">2027-03-19<\u002Fb><br>pack_hash&nbsp;&nbsp;&nbsp;&nbsp;<b style=\"color:var(--ink);font-weight:500\">9f3ac2…b71<\u002Fb> · prompt_v <b style=\"color:var(--ink);font-weight:500\">3<\u002Fb> · model_id <b style=\"color:var(--ink);font-weight:500\">llm-a<\u002Fb><br>output_json&nbsp;&nbsp;{ \"NVDA\": 0.92, \"LLY\": 0.81, \"AVGO\": 0.74, … }<br>replay&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;re-runs consume this row · 0 API calls<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:16px 0 0\">Nothing the AI produces is ever fed back into the numbers that judge it — and the AI only ever saw compact facts, never raw price history.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isRisk }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Risk<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">exposure, concentration, and the leverage guard<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/risk<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">Book-level guardrails across all live strategies, each against the clamp that bounds it. A strategy that sizes opens past available cash shows red here — so the fix has a visible home rather than living silently in the ledger.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px\">gross exposure &amp; cash · per strategy<\u002Fp>\n            <sc-for list=\"{{ exposureRows }}\" as=\"r\" hint-placeholder-count=\"3\"><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);gap:10px\"><span>{{ r.name }}<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:{{ r.c }}\">{{ r.txt }}<\u002Fb><\u002Fdiv><div style=\"height:8px;background:var(--panel-3);border:1px solid var(--line-soft);border-radius:999px;overflow:hidden;margin:7px 0 12px\"><i style=\"display:block;height:100%;width:{{ r.w }};background:{{ r.c }}\"><\u002Fi><\u002Fdiv><\u002Fsc-for>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:2px 0 0\">cash can never go negative — new positions are sized to available cash + planned sell proceeds, so a near-fully-invested account opens smaller or opens nothing<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px\">concentration &amp; correlation heat<\u002Fp>\n            <sc-for list=\"{{ concentrationRows }}\" as=\"r\" hint-placeholder-count=\"4\"><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);gap:10px\"><span>{{ r.name }}<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:var(--ink)\">{{ r.txt }}<\u002Fb><\u002Fdiv><div style=\"height:8px;background:var(--panel-3);border:1px solid var(--line-soft);border-radius:999px;overflow:hidden;margin:7px 0 12px\"><i style=\"display:block;height:100%;width:{{ r.w }};background:{{ r.c }}\"><\u002Fi><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:16px 0 0\">Each limit says which rule bound it. The same guardrails apply to math models and AI alike.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isData }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Data health<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">what the lab knows it doesn't trust<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/data-health<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">How much the underlying data can be trusted, surfaced honestly. Data-quality flags are shown, not hidden: warnings and rejects appear as a per-day strip, and every feed reports its state.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">quality flags · last 30 sessions<\u002Fp>\n            <div style=\"display:flex;gap:5px;flex-wrap:wrap\"><sc-for list=\"{{ qualityFlags }}\" as=\"q\" hint-placeholder-count=\"30\"><i style=\"{{ q.style }}\"><\u002Fi><\u002Fsc-for><\u002Fdiv>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:10px 0 14px\"><span style=\"color:var(--amber)\">3 warn<\u002Fspan> · <span style=\"color:var(--down)\">1 reject<\u002Fspan> · 26 clean · rejected days never enter the analysis<\u002Fp>\n            <sc-for list=\"{{ dataStats }}\" as=\"s\" hint-placeholder-count=\"3\"><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);margin-bottom:6px\"><span>{{ s.l }}<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:{{ s.c }}\">{{ s.v }}<\u002Fb><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">provider cross-checks &amp; feeds<\u002Fp>\n            <sc-for list=\"{{ crossChecks }}\" as=\"c\" hint-placeholder-count=\"6\"><div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);gap:10px;margin-bottom:8px\"><span>{{ c.l }}<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:{{ c.c }}\">{{ c.v }}<\u002Fb><\u002Fdiv><\u002Fsc-for>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:6px 0 0\">Every data feed has a named source and a backup, and stops rather than guessing when they disagree.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px;margin-top:16px\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin:0 0 12px;flex-wrap:wrap\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0\">Data lineage · point-in-time freshness<\u002Fp>\n            <span style=\"font-size:12px;color:var(--ink-faint)\">every number stands on a named, dated source<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto\"><sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n            <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"{{ thL }}\">what it feeds<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">source<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">as of<\u002Fsc-raw-th><sc-raw-th style=\"{{ thL }}\">freshness<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n            <sc-raw-tbody><sc-for list=\"{{ sourceLineage }}\" as=\"s\" hint-placeholder-count=\"7\">\n              <sc-raw-tr style-hover=\"background:rgba(255,255,255,.025)\"><sc-raw-td style=\"padding:11px 14px;border-bottom:1px solid var(--line-soft);font-weight:600\">{{ s.src }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:11px 14px;border-bottom:1px solid var(--line-soft);color:var(--ink-dim)\">{{ s.prov }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:11px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);color:var(--ink-dim)\">{{ s.asof }}<\u002Fsc-raw-td><sc-raw-td style=\"padding:11px 14px;border-bottom:1px solid var(--line-soft);white-space:nowrap\"><span style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:{{ s.c }};margin-right:7px;vertical-align:middle\"><\u002Fspan><span style=\"font-family:var(--mono);font-size:12px;color:{{ s.c }}\">{{ s.fresh }}<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <\u002Fsc-for><\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table><\u002Fdiv>\n          <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:12px 0 0\">a source past its expected lag stops the run rather than serving a stale number — nothing is silently carried forward<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--amber-line);border-radius:14px;background:rgba(226,162,59,.06);padding:18px 20px;margin-top:16px\">\n          <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin:0 0 12px\">admin action · manual unfreeze · shown in amber, never verdict gold<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\">\n            <div>\n              <p style=\"font-size:12.5px;color:var(--ink-dim);margin:0 0 10px\">A frozen NVDA position needs a manual corporate-action ratio. Interventions are typed-to-confirm, preview the exact rows, and write an audit trail.<\u002Fp>\n              <div style=\"font-family:var(--mono);font-size:12px;background:#0b0f1c;border:1px dashed var(--amber);border-radius:8px;padding:9px 12px;color:var(--ink)\">type \"UNFREEZE NVDA\" to confirm &nbsp;›&nbsp; <span style=\"color:var(--amber)\">UNFREEZE NVDA▮<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px\">rows this action will write<\u002Fp>\n              <div style=\"font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:#0b0f1c;border:1px solid var(--line-soft);border-radius:8px;padding:11px 13px;line-height:1.7\">+ <b style=\"color:var(--amber)\">corporate_actions<\u002Fb> (source='manual', split 10:1, ex 2027-03-18)<br>+ <b style=\"color:var(--amber)\">admin_actions<\u002Fb> (actor, reason, ts, before/after)<br>~ <b style=\"color:var(--amber)\">positions<\u002Fb> NVDA unfrozen · 210 → 2,100 sh<br><br>audit trail renders beneath on commit<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isResearch }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Research loop<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">the generative seat<\u002Fspan>\n          <button sc-camel-on-click=\"{{ openJournal }}\" style=\"margin-left:auto;appearance:none;border:1px solid var(--cyan-line);background:var(--cyan-soft);color:var(--cyan);font-family:var(--body);font-size:12.5px;font-weight:600;border-radius:8px;padding:7px 14px;cursor:pointer\" style-hover=\"background:rgba(76,201,224,.22)\">Open journal →<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">The AI proposes; you decide what actually runs. Every proposal must cite the evidence it grew from, and there's a fixed budget of new experiments each year so the lab can't just fish for a lucky result.<\u002Fp>\n        <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel-3);padding:16px 18px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:center;gap:14px;font-size:13px;color:var(--ink-dim);flex-wrap:wrap\"><span style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)\">fork budget 2027<\u002Fspan><div style=\"flex:1;min-width:120px;height:8px;background:#0b0f1c;border:1px solid var(--line-soft);border-radius:999px;overflow:hidden\"><i style=\"display:block;height:100%;width:50%;background:var(--cyan)\"><\u002Fi><\u002Fdiv><span style=\"font-family:var(--mono);font-size:12.5px\">3 of 6 used<\u002Fspan><span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\">trials n = 11 · deflated Sharpe uses all of them<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ hypotheses }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid var(--line);border-radius:12px;padding:15px 17px;background:var(--panel)\" style-hover=\"border-color:var(--line)\">\n              <span style=\"{{ h.chipStyle }}\">{{ h.chipText }}<\u002Fspan><sc-if value=\"{{ h.extraBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);border:1px dashed var(--line);border-radius:999px;padding:3px 9px;margin-left:8px\">{{ h.extraBadge }}<\u002Fspan><\u002Fsc-if>\n              <p style=\"font-size:13.5px;margin:10px 0 0\">{{ h.claim }}<\u002Fp>\n              <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:9px 0 0\">{{ h.meta }}<\u002Fp>\n              <sc-if value=\"{{ h.proposed }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:9px;margin-top:13px;flex-wrap:wrap\"><sc-for list=\"{{ h.buttons }}\" as=\"b\" hint-placeholder-count=\"3\"><button style=\"{{ b.s }}\">{{ b.t }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isJournal }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <button sc-camel-on-click=\"{{ openResearchFromJournal }}\" style=\"appearance:none;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--ink-faint);cursor:pointer;padding:0;margin:0 0 14px\" style-hover=\"color:var(--gold)\">← Research loop<\u002Fbutton>\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Analysis &amp; journal<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">pre-registration is the path of least resistance<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">The research journal. Left: assistant actions, each showing its cost before you run it. Middle: registering an idea to test — the easy default. Right: the journal, by outcome.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\">\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">research-assistant actions<\u002Fp>\n            <sc-for list=\"{{ assistantActions }}\" as=\"a\" hint-placeholder-count=\"3\"><div style=\"border:1px solid var(--line);border-radius:10px;background:var(--panel-3);padding:11px 13px;margin-bottom:9px\" style-hover=\"border-color:var(--gold-line)\"><span style=\"float:right;font-family:var(--mono);font-size:10.5px;color:var(--gold);border:1px solid var(--gold-line);border-radius:999px;padding:1px 8px\">{{ a.cost }}<\u002Fspan><p style=\"font-size:13px;font-weight:600;margin:0 0 3px\">{{ a.t }}<\u002Fp><p style=\"font-size:11.5px;color:var(--ink-dim);margin:0\">{{ a.d }}<\u002Fp><\u002Fdiv><\u002Fsc-for>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:2px 0 0\">cost shown before you run it · the result is saved as a linked journal entry<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">register a hypothesis<\u002Fp>\n            <sc-for list=\"{{ registerSteps }}\" as=\"s\" hint-placeholder-count=\"3\"><div style=\"display:flex;gap:13px;padding:11px 0;border-bottom:1px dashed var(--line-soft)\"><span style=\"font-family:var(--disp);font-weight:800;color:var(--cyan);font-size:16px;min-width:22px\">{{ s.n }}<\u002Fspan><span style=\"font-size:13px\"><b style=\"font-weight:600\">{{ s.t }}<\u002Fb> — {{ s.d }}<sc-if value=\"{{ s.locked }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-family:var(--mono);font-size:11px;color:var(--up);margin-top:6px\">{{ s.locked }}<\u002Fspan><\u002Fsc-if><\u002Fspan><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">journal · recent outcomes<\u002Fp>\n            <sc-for list=\"{{ journalOutcomes }}\" as=\"o\" hint-placeholder-count=\"4\"><div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px\"><span style=\"font-size:12.5px;color:var(--ink-dim)\"><span style=\"{{ o.chipStyle }}\">{{ o.chipText }}<\u002Fspan> {{ o.t }}<\u002Fspan><b style=\"font-family:var(--mono);font-weight:500;color:{{ o.mc }};white-space:nowrap\">{{ o.mark }}<\u002Fb><\u002Fdiv><\u002Fsc-for>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:8px 0 0\">every closed row carries a lesson line that feeds the next proposal (memory A)<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isReplay }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Arena replay<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">operable, and impossible to mistake for forward<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/replay<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">Replay runs the full pipeline on a simulated clock to validate the machinery and calibrate thresholds. It is quarantined everywhere: a permanent banner, a separate trials column, and no path by which a replay result becomes promotion evidence.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:13px 17px;border-radius:10px;background:repeating-linear-gradient(135deg,rgba(90,107,140,.16),rgba(90,107,140,.16) 12px,rgba(90,107,140,.06) 12px,rgba(90,107,140,.06) 24px);border:1px solid rgba(90,107,140,.5);flex-wrap:wrap;margin-bottom:16px\">\n          <span style=\"font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a97b8;font-weight:600\">replay · not forward evidence<\u002Fspan>\n          <span style=\"font-size:12.5px;color:var(--ink-dim)\">simulated clock 2011 → 2026 · results can never count as real evidence · AI seats excluded<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n          <sc-for list=\"{{ replayCards }}\" as=\"c\" hint-placeholder-count=\"3\"><div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:18px 20px\"><p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px\">{{ c.ph }}<\u002Fp><span style=\"font-family:var(--disp);font-weight:800;font-size:26px\">{{ c.big }}<\u002Fspan><p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:8px 0 0\">{{ c.foot }}<\u002Fp><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:16px 0 0\">Replay results are kept completely separate and can never appear on the live leaderboard.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <footer style=\"margin-top:44px;padding-top:20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--ink-faint)\">AlphaLab · interactive prototype · every honesty rule shown is resolved server-side in the D58 read-models · research / paper-trading only — not investment advice<\u002Ffooter>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view:'home', sel:'momentum:v1', pStrat:'roster', pBook:'overview', jTab:'journal', plain:true };\n  setView = (v) => { this.setState({ view:v }); if (typeof window!=='undefined') window.scrollTo({top:0}); };\n  setPlain = (p) => this.setState({ plain:p });\n  openStrategy = (id) => { this.setState({ view:'strategyDetail', sel:id }); if (typeof window!=='undefined') window.scrollTo({top:0}); };\n  setPStrat = (s) => this.setState({ pStrat:s, pBook:'overview' });\n  setPBook = (b) => this.setState({ pBook:b });\n\n  chip(kind){\n    const m={ early:['var(--gold-soft)','var(--gold)'], retired:['var(--down-soft)','var(--down)'], ok:['var(--up-soft)','var(--up)'], neutral:['#1a2138','var(--ink-dim)'], ab:['var(--violet-soft)','var(--violet)'], clone:['rgba(240,168,104,.14)','#f0a868'] };\n    const [bg,c]=m[kind]||m.neutral;\n    return `font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:999px;white-space:nowrap;background:${bg};color:${c}`;\n  }\n  seat(kind){\n    const m={ math:['var(--cyan-soft)','var(--cyan)'], ai:['var(--violet-soft)','var(--violet)'], ref:['#1a2138','var(--ink-faint)'] };\n    const [bg,c]=m[kind]||m.ref;\n    return `font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:999px;background:${bg};color:${c}`;\n  }\n\n  renderVals(){\n    const v = this.state.view;\n    const plain = this.state.plain;\n    const parent = { strategyDetail:'strategies', pairs:'ai', audit:'decisions', journal:'research' };\n    const active = parent[v] || v;\n    const navBase='appearance:none;border:none;background:transparent;font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;padding:8px 13px;border-radius:8px;color:var(--ink-dim);white-space:nowrap;transition:.15s';\n    const nav = [['home','Home'],['strategies','Strategies'],['portfolio','Portfolio'],['allocation','Allocation'],['ai','AI seats'],['research','Research'],['decisions','Decisions'],['risk','Risk'],['data','Data health'],['replay','Replay']]\n      .map(([id,label])=>({ id, label, onClick:()=>this.setView(id), style: navBase + (active===id?';color:var(--gold);background:var(--gold-soft)':'') }));\n\n    const seatPill='display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:12px;background:var(--panel);white-space:nowrap';\n    const dotB='width:7px;height:7px;border-radius:50%';\n    const seats=[\n      { nm:'Researcher', st:'active · 3/6 forks', style:seatPill+';border-color:var(--cyan-line)', dot:dotB+';background:var(--cyan)', nmStyle:'font-weight:600;color:var(--cyan)' },\n      { nm:'Contestant', st:'1 live + 1 control', style:seatPill+';border-color:var(--violet-line)', dot:dotB+';background:var(--violet)', nmStyle:'font-weight:600;color:var(--violet)' },\n      { nm:'Advisor', st:'deferred', style:seatPill+';border-style:dashed', dot:dotB+';background:var(--ink-faint)', nmStyle:'font-weight:600;color:var(--ink-faint)' },\n    ];\n\n    const thL='font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel-3);position:sticky;top:0';\n\n    const homeKpis=[\n      { label:'total equity', value:'$1,043,180', vc:'var(--ink)', sub:'+4.3% since inception', sc:'var(--up)' },\n      { label:\"today's P&L\", value:'+$3,910', vc:'var(--up)', sub:'+0.38%', sc:'var(--up)' },\n      { label:'open decisions', value:'1', vc:'var(--gold)', sub:'H-16 awaiting registration', sc:'var(--ink-faint)' },\n      { label:'data health', value:'26/30', vc:'var(--ink)', sub:'clean sessions · 1 reject', sc:'var(--ink-faint)' },\n    ];\n    const attention=[\n      { tag:'act', accent:'var(--down)', title:'meanrev:rsi3 auto-retired', body:'Per-trade expectancy crossed negative over 412 trades. No action required to stop it; review the post-mortem when convenient.', cta:'post-mortem →', onClick:()=>this.setView('strategies') },\n      { tag:'watch', accent:'var(--gold)', title:'H-16 awaiting your pre-registration', body:'The researcher seat proposed a vol-gated momentum fork citing decay finding #204. It does not run until you register it.', cta:'review →', onClick:()=>this.setView('research') },\n      { tag:'watch', accent:'var(--gold)', title:'1 data-quality reject this week', body:\"One day's data failed an automatic quality check and never entered the analysis. Nothing broke; the flag is logged.\", cta:'data health →', onClick:()=>this.setView('data') },\n      { tag:'info', accent:'var(--cyan)', title:'momentum:v1 crossed 200 trading days', body:'Still too early; its separation band narrowed this month.', cta:'strategy →', onClick:()=>this.openStrategy('momentum:v1') },\n    ];\n\n    const cloneChip=this.chip('clone');\n    const vPlain = { early:'Not enough data yet', retired:'Auto-retired', neutral:'Benchmark', ok:'Working', ab:'Testing' };\n    const mk=(o)=>{\n      const accent = o.seat==='math'?'var(--cyan)':o.seat==='ai'?'var(--violet)':'transparent';\n      const nameColor = o.seat==='ref'?'var(--ink-faint)':'var(--ink)';\n      return { ...o, accent, nameColor, seatStyle:this.seat(o.seat), verdictStyle:this.chip(o.vt),\n        verdict: plain ? (vPlain[o.vt]||o.verdict) : o.verdict,\n        cursor:o.clickable?'pointer':'default', onClick:o.clickable?()=>this.openStrategy(o.id):null,\n        pctColor:o.seat==='ref'?'var(--ink-faint)':'var(--ink-dim)' };\n    };\n    const strategies=[\n      mk({ id:'momentum:v1', name:'momentum:v1', seat:'math', seatText:'math', fam:'trend', famColor:'#7fb0ff', famLine:'rgba(127,176,255,.4)', alphaText:'~ +1.4%', alphaColor:'var(--ink-faint)', gauge:true, gpos:'63%', gcol:'var(--ink-faint)', mde:'±4.8', pct:'71st', verdict:'too early', vt:'early', sep:'emerging · 214d', sub:'rank buffer 40/
