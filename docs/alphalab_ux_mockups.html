document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

font-display: swap;\n  src: url(\"1bdac113-69b9-4e0e-8c51-c91b5047242a\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"88668cf4-542b-4cab-8ac0-5e3776b7542c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"772531ed-e439-4e8b-9bd2-0f398ef9bf45\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7add28c6-7432-4b13-ada1-839bcdaa3e04\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --bg:#0d1120; --panel:#151a2c; --panel-2:#1c2340; --panel-3:#0f1526;\n  --line:#273052; --line-soft:#1d2540;\n  --ink:#eef1f8; --ink-dim:#949db8; --ink-faint:#5c6584;\n  --gold:#e9b44c; --gold-soft:rgba(233,180,76,.13); --gold-line:rgba(233,180,76,.42);\n  --cyan:#4cc9e0; --cyan-soft:rgba(76,201,224,.13); --cyan-line:rgba(76,201,224,.4);\n  --violet:#8b7cf6; --violet-soft:rgba(139,124,246,.15); --violet-line:rgba(139,124,246,.42);\n  --up:#3fd68c; --up-soft:rgba(63,214,140,.14); --down:#f2555a; --down-soft:rgba(242,85,90,.14);\n  --amber:#e2a23b; --amber-line:rgba(226,162,59,.45);\n  --disp:'Archivo',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;\n}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased}\na{color:var(--gold);text-decoration:none} a:hover{color:#f4c96e}\n::selection{background:var(--gold-soft);color:var(--ink)}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}\n::-webkit-scrollbar-thumb:hover{background:#33406b}\n::-webkit-scrollbar-track{background:transparent}\n@keyframes pls{0%,100%{opacity:1}50%{opacity:.35}}\n@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}\n@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:radial-gradient(1400px 700px at 85% -10%, #17203a 0%, transparent 55%), radial-gradient(1100px 560px at -5% 0%, #131a30 0%, transparent 50%), var(--bg)\">\n\n  <header style=\"position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:20px;padding:13px 26px;background:rgba(13,17,32,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);flex-wrap:wrap\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <span style=\"font-family:var(--disp);font-weight:800;font-size:17px;letter-spacing:-.015em\">Alpha<span style=\"color:var(--gold)\">Lab<\u002Fspan><\u002Fspan>\n      <span style=\"font-family:var(--mono);font-size:11px;color:var(--ink-dim);border:1px solid var(--line);border-radius:999px;padding:3px 11px;background:var(--panel-3);white-space:nowrap\">arena · S&amp;P 500<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display:flex;gap:2px;flex-wrap:wrap\">\n      <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"10\">\n        <button sc-camel-on-click=\"{{ n.onClick }}\" style=\"{{ n.style }}\" style-hover=\"color:var(--ink)\">{{ n.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:3px;border:1px solid var(--line);border-radius:9px;padding:2px;background:var(--panel-3)\" title=\"Switch wording — plain English for everyone, or the exact technical terms\">\n      <sc-for list=\"{{ plainSeg }}\" as=\"s\" hint-placeholder-count=\"2\"><button sc-camel-on-click=\"{{ s.onClick }}\" style=\"{{ s.style }}\">{{ s.label }}<\u002Fbutton><\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--ink-faint)\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 9px var(--up);animation:pls 2.6s infinite\"><\u002Fspan>\n      <span>2027-03-19 · watermark ok<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"display:flex;align-items:center;gap:9px;padding:8px 26px;background:var(--panel-3);border-bottom:1px solid var(--line);flex-wrap:wrap\">\n    <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);margin-right:2px\">AI seats<\u002Fspan>\n    <sc-for list=\"{{ seats }}\" as=\"s\" hint-placeholder-count=\"3\">\n      <span style=\"{{ s.style }}\"><span style=\"{{ s.dot }}\"><\u002Fspan><span style=\"{{ s.nmStyle }}\">{{ s.nm }}<\u002Fspan><span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)\">{{ s.st }}<\u002Fspan><\u002Fspan>\n    <\u002Fsc-for>\n    <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\">every AI seat is judged by the same rules<\u002Fspan>\n  <\u002Fdiv>\n\n  <main style=\"max-width:1240px;margin:0 auto;padding:32px 26px 40px;width:100%\">\n\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:26px;margin:0;letter-spacing:-.02em\">Good evening — here's what needs you.<\u002Fh1>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/attention<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:14px;margin:0 0 24px;max-width:70ch\">A ranked queue of what actually needs the operator — act, watch, know — not a wall of green ticks. If nothing needs you, it says so.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:28px\">\n          <sc-for list=\"{{ homeKpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--panel-3));padding:16px 18px\">\n              <p style=\"font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 9px\">{{ k.label }}<\u002Fp>\n              <p style=\"font-family:var(--disp);font-weight:800;font-size:25px;letter-spacing:-.01em;margin:0;color:{{ k.vc }}\">{{ k.value }}<\u002Fp>\n              <p style=\"font-family:var(--mono);font-size:11px;margin:5px 0 0;color:{{ k.sc }}\">{{ k.sub }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">attention queue<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px\">\n          <sc-for list=\"{{ attention }}\" as=\"q\" hint-placeholder-count=\"4\">\n            <div sc-camel-on-click=\"{{ q.onClick }}\" style=\"display:flex;gap:15px;align-items:flex-start;border:1px solid var(--line);border-left:3px solid {{ q.accent }};border-radius:12px;padding:15px 17px;background:var(--panel);cursor:pointer;transition:.15s\" style-hover=\"border-color:{{ q.accent }};transform:translateX(2px)\">\n              <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:{{ q.accent }};min-width:44px;padding-top:2px\">{{ q.tag }}<\u002Fspan>\n              <div style=\"flex:1\"><p style=\"margin:0 0 4px;font-size:14px;font-weight:600\">{{ q.title }}<\u002Fp><p style=\"margin:0;font-size:12.5px;color:var(--ink-dim);max-width:82ch\">{{ q.body }}<\u002Fp><\u002Fdiv>\n              <span style=\"font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;padding-top:2px\">{{ q.cta }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:16px 0 0\">ranked by what needs you, not by recency · an empty queue renders \"nothing needs you tonight\", never filler<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStrategies }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Strategies<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">two rosters, one judge<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/strategies<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 18px;max-width:80ch\">Each strategy is scored against 200 random look-alikes with no skill. A dimmed, greyed number means the edge is still smaller than the measurement error — so we don't yet claim it's real. Click any live row to open it.<\u002Fp>\n        <sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;gap:20px;flex-wrap:wrap;align-items:center;border:1px solid var(--line);border-radius:12px;background:var(--panel-3);padding:13px 17px;margin-bottom:16px\">\n            <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)\">How to read this<\u002Fspan>\n            <span style=\"font-size:12.5px;color:var(--ink-dim);display:flex;align-items:center;gap:9px\"><span style=\"position:relative;display:inline-block;width:60px;height:12px\"><span style=\"position:absolute;left:0;right:0;top:5px;height:2px;background:var(--line);border-radius:2px\"><\u002Fspan><span style=\"position:absolute;left:50%;top:1px;bottom:1px;width:1px;background:#3a4569\"><\u002Fspan><span style=\"position:absolute;top:2px;left:60%;width:8px;height:8px;border-radius:50%;background:var(--ink-faint)\"><\u002Fspan><\u002Fspan>dot near the middle = edge still within the noise<\u002Fspan>\n            <span style=\"font-size:12.5px;color:var(--ink-dim)\"><span style=\"color:var(--ink-faint)\">~ grey number<\u002Fspan> = can't be told apart from luck yet<\u002Fspan>\n            <span style=\"font-size:12.5px;color:var(--ink-dim)\"><span style=\"color:var(--gold)\">coloured number<\u002Fspan> = a real, measurable edge<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden\">\n          <div style=\"overflow-x:auto\">\n          <sc-raw-table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n            <sc-raw-thead><sc-raw-tr>\n              <sc-for list=\"{{ lbHeaders }}\" as=\"h\" hint-placeholder-count=\"6\"><sc-raw-th style=\"{{ thL }}\"><sc-if value=\"{{ h.hasTip }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"{{ h.tip }}\" style=\"border-bottom:1px dotted var(--ink-faint);cursor:help\">{{ h.l }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ h.noTip }}\" hint-placeholder-val=\"{{ true }}\">{{ h.l }}<\u002Fsc-if><\u002Fsc-raw-th><\u002Fsc-for>\n            <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n            <sc-for list=\"{{ strategies }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <sc-raw-tr sc-camel-on-click=\"{{ r.onClick }}\" style=\"cursor:{{ r.cursor }};transition:.12s\" style-hover=\"background:rgba(255,255,255,.025)\">\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);border-left:3px solid {{ r.accent }}\">\n                  <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"font-weight:600;color:{{ r.nameColor }}\">{{ r.name }}<\u002Fspan><span style=\"{{ r.seatStyle }}\">{{ r.seatText }}<\u002Fspan><sc-if value=\"{{ r.clone }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ cloneChip }}\">{{ r.cloneText }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                  <div style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:3px\">{{ r.sub }}<\u002Fdiv>\n                <\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft)\"><span style=\"font-family:var(--mono);font-size:10.5px;color:{{ r.famColor }};border:1px solid {{ r.famLine }};border-radius:999px;padding:2px 9px;white-space:nowrap\">{{ r.fam }}<\u002Fspan><\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);white-space:nowrap\">\n                  <span style=\"font-family:var(--mono);font-size:12.5px;color:{{ r.alphaColor }}\">{{ r.alphaText }}<\u002Fspan>\n                  <sc-if value=\"{{ r.gauge }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"position:relative;display:inline-block;width:96px;height:14px;vertical-align:middle;margin:0 7px\">\n                      <span style=\"position:absolute;left:0;right:0;top:6px;height:2px;background:var(--line);border-radius:2px\"><\u002Fspan>\n                      <span style=\"position:absolute;left:50%;top:2px;bottom:2px;width:1px;background:#3a4569\"><\u002Fspan>\n                      <span style=\"position:absolute;top:3px;left:{{ r.gpos }};width:8px;height:8px;border-radius:50%;background:{{ r.gcol }};box-shadow:0 0 8px {{ r.gcol }};transform:translateX(-50%)\"><\u002Fspan>\n                    <\u002Fspan>\n                    <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\">{{ r.mde }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:12.5px;color:{{ r.pctColor }}\">{{ r.pct }}<\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft)\"><span style=\"{{ r.verdictStyle }}\">{{ r.verdict }}<\u002Fspan><\u002Fsc-raw-td>\n                <sc-raw-td style=\"padding:13px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:11px;color:var(--ink-faint)\">{{ r.sep }}<\u002Fsc-raw-td>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-for>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\"><p style=\"font-size:12px;color:var(--ink-faint);margin:14px 0 0\">Every number here is scored the same way, against the strategy's own matched set of random look-alikes — so ordering the list never implies we believe one is better.<\u002Fp><\u002Fsc-if>\n        <sc-if value=\"{{ expert }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:14px 0 0\">~ dimmed = gap inside its Newey–West MDE · percentile = rank within the strategy's own turnover-matched population<\u002Fp><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStrategyDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <button sc-camel-on-click=\"{{ backToStrategies }}\" style=\"appearance:none;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--ink-faint);cursor:pointer;padding:0;margin:0 0 14px\" style-hover=\"color:var(--gold)\">← Strategies<\u002Fbutton>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--panel-3));padding:20px 22px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px\">verdict &amp; band<\u002Fp>\n            <span style=\"font-family:var(--disp);font-weight:800;font-size:28px;letter-spacing:-.01em\">{{ selName }}<\u002Fspan>\n            <div style=\"margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n              <span style=\"{{ selVerdictStyle }}\">{{ selVerdict }}<\u002Fspan>\n              <span style=\"font-family:var(--mono);font-size:13px;color:var(--ink-faint)\">{{ selAlpha }}/yr<\u002Fspan>\n              <span style=\"position:relative;display:inline-block;width:104px;height:14px;vertical-align:middle\">\n                <span style=\"position:absolute;left:0;right:0;top:6px;height:2px;background:var(--line);border-radius:2px\"><\u002Fspan>\n                <span style=\"position:absolute;left:50%;top:2px;bottom:2px;width:1px;background:#3a4569\"><\u002Fspan>\n                <span style=\"position:absolute;top:3px;left:{{ selGpos }};width:8px;height:8px;border-radius:50%;background:{{ selGcol }};box-shadow:0 0 8px {{ selGcol }};transform:translateX(-50%)\"><\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\">{{ selMde }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ plainHelp }}\" hint-placeholder-val=\"{{ true }}\"><p style=\"color:var(--ink-dim);font-size:12.5px;margin:14px 0 0\">{{ selReading }}<\u002Fp><\u002Fsc-if>\n            <sc-if value=\"{{ expert }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"color:var(--ink-dim);font-size:12.5px;margin:14px 0 0\">Emerging separation. At the current tracking error a real +2%/yr edge becomes decidable near ~2.4y (verdict possible ≈ Aug 2029); the date moves as the gap moves.<\u002Fp><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:20px 22px\">\n            <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px\">what this strategy really is · for insight only<\u002Fp>\n            <sc-for list=\"{{ factorRows }}\" as=\"f\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);margin-bottom:3px\"><span>{{ f.l }}<\u002Fspan><span style=\"font-family:var(--mono);color:var(--ink)\">{{ f.v }}<\u002Fspan><\u002Fdiv>\n              <sc-if value=\"{{ f.bar }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"height:7px;background:var(--panel-3);border:1px solid var(--line-soft);border-radius:999px;overflow:hidden;margin-bottom:11px\"><i style=\"display:block;height:100%;width:{{ f.w }};background:{{ f.c }}\"><\u002Fi><\u002Fdiv><\u002Fsc-if>\n            <\u002Fsc-for>\n            <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:6px 0 0\">most of the return is momentum exposure · attribution is never a trading input<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:20px 22px;margin-top:16px\">\n          <p style=\"font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 4px\">equity vs population band &amp; benchmarks<\u002Fp>\n          <svg sc-camel-view-box=\"0 0 920 210\" width=\"100%\" style=\"display:block\" role=\"img\">\n            <defs><linearGradient id=\"eqA\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#4cc9e0\" stop-opacity=\".26\"><\u002Fstop><stop offset=\"1\" stop-color=\"#4cc9e0\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n            <line x1=\"0\" y1=\"52\" x2=\"920\" y2=\"52\" stroke=\"#1d2540\" stroke-width=\"1\"><\u002Fline><line x1=\"0\" y1=\"102\" x2=\"920\" y2=\"102\" stroke=\"#1d2540\" stroke-width=\"1\"><\u002Fline><line x1=\"0\" y1=\"152\" x2=\"920\" y2=\"152\" stroke=\"#1d2540\" stroke-width=\"1\"><\u002Fline>\n            <rect x=\"0\" y=\"60\" width=\"920\" height=\"112\" fill=\"rgba(76,201,224,.05)\"><\u002Frect>\n            <text x=\"8\" y=\"24\" fill=\"#5c6584\" font-family=\"IBM Plex Mono\" font-size=\"11\">shaded = range of 200 random look-alikes<\u002Ftext>\n            <polygon points=\"0,150 92,143 184,150 276,131 368,138 460,114 552,123 644,99 736,88 828,72 908,60 908,192 0,192\" fill=\"url(#eqA)\"><\u002Fpolygon>\n            <polyline fill=\"none\" stroke=\"#4cc9e0\" stroke-width=\"2.4\" stroke-linejoin=\"round\" points=\"0,150 92,143 184,150 276,131 368,138 460,114 552,123 644,99 736,88 828,72 908,60\"><\u002Fpolyline>\n            <polyline fill=\"none\" stroke=\"#5c6584\" stroke-width=\"1.5\" stroke-dasharray=\"6 5\" points=\"0,158 230,150 460,140 690,128 908,118\"><\u002Fpolyline>\n            <polyline fill=\"none\" stroke=\"#3a4569\" stroke-width=\"1.5\" stroke-dasharray=\"2 5\" points=\"0,164 230,158 460,150 690,142 908,134\"><\u002Fpolyline>\n            <circle cx=\"908\" cy=\"60\" r=\"4.5\" fill=\"#4cc9e0\"><\u002Fcircle><circle cx=\"908\" cy=\"60\" r=\"9\" fill=\"none\" stroke=\"#4cc9e0\" stroke-opacity=\".4\" stroke-width=\"1.5\"><\u002Fcircle>\n          <\u002Fsvg>\n          <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:6px 0 0\">cyan = strategy · dashed = cap-weight benchmark · dotted = equal-weight · sits at the top of its band, not yet outside it<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isPortfolio }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fu .3s ease\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 4px;flex-wrap:wrap\">\n          <h1 style=\"font-family:var(--disp);font-weight:700;font-size:24px;margin:0;letter-spacing:-.02em\">Portfolio<\u002Fh1>\n          <span style=\"font-size:14px;color:var(--ink-dim)\">the live book, across every strategy<\u002Fspan>\n          <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.13em\">GET /api/v1/portfolio<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-dim);font-size:13.5px;margin:0 0 22px;max-width:80ch\">A left menu lists your strategies and, under a chosen one, its book views. The roster view sums every strategy; pick one to drill into its book — each trades its own separate pretend account.<\u002Fp>\n        <div style=\"border:1px solid var(--line);border-radius:14px;overflow:hidden;display:grid;grid-template-columns:220px minmax(0,1fr);background:var(--panel)\">\n          <div style=\"border-right:1px solid var(--line);padding:14px 12px;background:var(--panel-3)\">\n            <div style=\"font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:4px 6px 8px\">strategy<\u002Fdiv>\n            <sc-for list=\"{{ railStrats }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div sc-camel-on-click=\"{{ r.onClick }}\" style=\"{{ r.style }}\" style-hover=\"color:var(--ink)\"><span style=\"{{ r.mkStyle }}\"><\u002Fspan>{{ r.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ isRoster }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:14px 6px 0\">select a strategy to open its book<\u002Fdiv><\u002Fsc-if>\n            <div style=\"display:{{ bookMenuDisplay }}\">\n              <div style=\"font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:18px 6px 6px\">book views<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin:0 6px 8px\">{{ pStratName }}<\u002Fdiv>\n              <sc-for list=\"{{ bookViews }}\" as=\"b\" hint-placeholder-count=\"4\">\n                <button sc-camel-on-click=\"{{ b.onClick }}\" style=\"{{ b.style }}\" style-hover=\"color:var(--ink)\">{{ b.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;min-width:0\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-bottom:16px\"><span style=\"color:var(--gold)\">{{ pStratName }}<\u002Fspan> · {{ crumb }}<\u002Fdiv>\n\n            <sc-if value=\"{{ isRoster }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px\">\n                <sc-for list=\"{{ rosterKpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n                  <div style=\"border:1px solid var(--line);border-radius:12px;background:var(--panel-3);padding:13px 15px\">\n                    <p style=\"font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 7px\">{{ k.label }}<\u0
